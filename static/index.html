<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSV 编辑器</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">工艺规程文件</div>
          <h1 id="page-title">CSV 编辑器</h1>
        </div>
        <div class="status" id="status">准备就绪</div>
      </header>

      <section class="panel controls">
        <label>
          文件
          <select id="file-select"></select>
        </label>
        <div class="actions">
          <button id="refresh-files" type="button">刷新文件</button>
          <button id="reload-file" type="button">重新载入</button>
          <button id="add-row" type="button" class="secondary">新增行</button>
          <button id="save" class="primary" type="button">保存</button>
        </div>
      </section>

      <section class="panel meta">
        <div>编码：<span id="encoding">-</span></div>
        <div>行数：<span id="row-count">0</span></div>
        <div>列数：<span id="col-count">0</span></div>
        <div>路径：<span id="file-path">-</span></div>
      </section>

      <section class="panel table-panel">
        <div id="empty-state" class="empty hidden">
          <div class="empty-title">当前没有数据</div>
          <div class="empty-text">点击下方按钮新增第一行，或者先切换到其他 CSV 文件。</div>
          <button id="empty-add-row" type="button" class="primary">新增第一行</button>
        </div>
        <div class="table-wrap">
          <table id="csv-table"></table>
        </div>
      </section>
    </div>

    <div id="row-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="row-modal-title">
      <div class="modal-backdrop" data-close-modal="1"></div>
      <div class="modal-card">
        <div class="modal-header">
          <div>
            <h2 id="row-modal-title">编辑行</h2>
            <div class="modal-subtitle" id="row-modal-subtitle"></div>
          </div>
          <button id="close-modal" class="icon-btn" type="button" aria-label="关闭">×</button>
        </div>
        <div id="row-form" class="row-form"></div>
        <div class="modal-actions">
          <button id="insert-row" type="button">在下方新增一行</button>
          <button id="delete-row" type="button" class="danger">删除这一行</button>
          <button id="cancel-row" type="button">取消</button>
          <button id="apply-row" type="button" class="primary">保存这一行</button>
        </div>
      </div>
    </div>
  </body>
</html>
